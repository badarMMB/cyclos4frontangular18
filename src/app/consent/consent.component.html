@if (initialized$ | async) {
  <div class="card">
    <div class="system">
      <img class="system-image" [src]="data.applicationLogo.url" [alt]="data.applicationName" />
    </div>
    <div class="title">{{ title }}</div>
    <router-outlet></router-outlet>
  </div>
} @else {
  <spinner></spinner>
}
<ng-template #spinner>
  <spinner></spinner>
</ng-template>
