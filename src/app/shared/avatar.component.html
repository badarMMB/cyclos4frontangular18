@if (image) {
  @if (url) {
    <div
      class="avatar-container"
      [ngClass]="{
        'round-borders': url != null && roundBorders,
        'full-size': fullSize
      }"
      [ngStyle]="{
        backgroundImage: 'url(' + url + ')',
        backgroundSize: zoom ? 'cover' : 'contain',
        backgroundPosition: zoom ? 'center 30%' : 'center',
        width: fullSize ? '' : size + 'px',
        height: fullSize ? '' : size + 'px'
      }"></div>
  }
} @else {
  <div
    class="avatar-container"
    (click)="click.emit($event)"
    [ngClass]="{
      'full-size': fullSize
    }"
    [ngStyle]="{
      width: fullSize ? '' : size + 'px',
      height: fullSize ? '' : size + 'px'
    }">
    <icon [icon]="icon" [size]="iconSize || size" [ngStyle]="{ color: iconColor }"></icon>
  </div>
}
