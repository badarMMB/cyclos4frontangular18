<input
  #inputField
  class="d-none"
  type="file"
  accept="image/png,image/jpeg,image/gif"
  (change)="filesSelected(inputField.files)"
  [multiple]="max > 1" />
@if ((files | async)?.length > 0) {
  <div [ngClass]="containerClass">
    @for (file of files.value; track file) {
      <progressbar class="mt-1" [max]="file.totalSize" [value]="file.progress$ | async">
        {{ file.name }}
      </progressbar>
    }
  </div>
}
