@if (label) {
  <label-value [formField]="self" [informationText]="informationText">
    <ng-container *ngTemplateOutlet="widget"></ng-container>
  </label-value>
} @else {
  <div class="d-flex mw-100 w-100">
    <user-field
      #userField
      [formControl]="userFieldControl"
      [allowSearch]="allowSearch"
      [allowContacts]="allowContacts"
      [allowPrincipal]="allowPrincipal"
      [principalTypes]="principalTypes"
    (selected)="add($event)"></user-field>
  </div>
  @if (users.length > 0) {
    <div class="d-flex mw-100 w-100 flex-wrap">
      @for (user of users; track user) {
        <chip
          class="mt-2 mr-2"
          [image]="user.image"
          [icon]="SvgIcon.Person"
          (close)="remove(user)">
          {{ user.display }}
        </chip>
      }
    </div>
  }
  <field-errors [control]="formControl"></field-errors>
}

<ng-template #widget>
  <div class="d-flex mw-100 w-100">
    <user-field
      #userField
      [formControl]="userFieldControl"
      [allowSearch]="allowSearch"
      [allowContacts]="allowContacts"
      [allowPrincipal]="allowPrincipal"
      [principalTypes]="principalTypes"
    (selected)="add($event)"></user-field>
  </div>
  @if (users.length > 0) {
    <div class="d-flex mw-100 w-100 flex-wrap">
      @for (user of users; track user) {
        <chip
          class="mt-2 mr-2"
          [image]="user.image"
          [icon]="SvgIcon.Person"
          (close)="remove(user)">
          {{ user.display }}
        </chip>
      }
    </div>
  }
  <field-errors [control]="formControl"></field-errors>
</ng-template>
