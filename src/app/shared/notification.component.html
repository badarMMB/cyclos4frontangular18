<alert [type]="alertType" [dismissible]="allowClose && (layout.gtxxs$ | async)" (onClose)="modalRef.hide()">
  <div class="d-flex flex-column flex-xs-row align-items-center">
    <div class="notification-icon">
      <icon size="2rem" [icon]="icon ? icon : defaultIcon"></icon>
    </div>
    @if (message) {
      <div class="notification-message" [innerHTML]="message | trust"></div>
    } @else {
      <div class="notification-message">
        <ng-content></ng-content>
      </div>
    }
  </div>
</alert>
