<input
  #inputField
  class="d-none"
  type="file"
  (change)="filesSelected(inputField.files)"
  [accept]="accept"
  [multiple]="max > 1" />
@if (files?.length > 0) {
  <div [ngClass]="containerClass">
    @for (file of files; track file) {
      <progressbar class="mt-1" [max]="file.totalSize" [value]="file.progress$ | async">
        {{ file.name }}
      </progressbar>
    }
  </div>
}
