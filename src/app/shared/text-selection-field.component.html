@if (label) {
  <label-value [formField]="self" [informationText]="informationText">
    <ng-container *ngTemplateOutlet="widget"></ng-container>
  </label-value>
} @else {
  <ng-container *ngTemplateOutlet="widget"></ng-container>
}

<ng-template #widget>
  @if (!maxItemsReached) {
    <div class="d-flex mw-100 w-100">
      <div class="d-flex flex-grow-1 mw-100">
        <input-field #inputField [formControl]="inputFieldControl"> </input-field>
      </div>
      <div class="d-flex ml-2">
        <button type="button" class="btn btn-icon" [tooltip]="i18n.general.add" (click)="add()">
          <icon [icon]="SvgIcon.PlusCircle"></icon>
        </button>
      </div>
    </div>
  } @else {
    <div class="mt-2">
      {{ i18n.general.maxItemsReached }}
    </div>
  }
  @if (value.length > 0) {
    <div class="d-flex mw-100 w-100 flex-wrap">
      @for (str of value; track str) {
        <chip [icon]="SvgIcon.Search" class="mt-2 mr-2" (close)="remove(str)">
          {{ str }}
        </chip>
      }
    </div>
  }
  <field-errors [control]="formControl"></field-errors>
</ng-template>
