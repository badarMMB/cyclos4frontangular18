@if (path != null && canViewProfile()) {
  <maybe-link [link]="path" class="d-flex flex-row">
    <ng-container *ngTemplateOutlet="displayTpl"></ng-container>
  </maybe-link>
} @else {
  <div class="d-flex flex-row" [ngClass]="{ 'has-link': !!path }">
    @if (!operator && !hideIcon) {
      <avatar
        ngClass="me-2"
        [image]="user?.image"
        [icon]="user ? SvgIcon.Person : SvgIcon.Briefcase"
        size="small">
      </avatar>
    }
    <div class="display-text">
      {{ display }}
      @if (account?.number) {
        ({{ account.number }})
      }
    </div>
  </div>
}

<ng-template #displayTpl>
  <div class="d-flex flex-row" [ngClass]="{ 'has-link': !!path }">
    @if (!operator && !hideIcon) {
      <avatar
        ngClass="me-2"
        [image]="user?.image"
        [icon]="user ? SvgIcon.Person : SvgIcon.Briefcase"
        size="small">
      </avatar>
    }
    <div class="display-text">
      {{ display }}
      @if (account?.number) {
        ({{ account.number }})
      }
    </div>
  </div>
</ng-template>
