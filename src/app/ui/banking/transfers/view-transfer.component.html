<page-layout [ready]="data$ | async">
  @if (data) {
    <page-content
      last
      mode="viewForm"
      [heading]="i18n.transaction.title.detailsTransfer"
      [mobileHeading]="i18n.transaction.mobileTitle.detailsTransfer"
      [headingActions]="headingActions$ | async">
      <transfer-details [headingActions]="headingActions$ | async" [transfer]="transfer"></transfer-details>
    </page-content>
  }
</page-layout>
