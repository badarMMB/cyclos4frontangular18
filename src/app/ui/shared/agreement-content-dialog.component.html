@if (content$ | async; as content) {
  <div #contentDiv>
    <h1>
      {{ agreement.name }}
    </h1>
    <div class="mb-3" [innerHTML]="content | trust"></div>
  </div>
  <actions forceRow>
    <action-button (action)="print(contentDiv, printOutput)" [label]="i18n.general.print"> </action-button>
    <action-button outline (action)="modalRef.hide()" [label]="i18n.general.close"> </action-button>
  </actions>
  <iframe class="d-none" #printOutput></iframe>
} @else {
  <spinner></spinner>
}
